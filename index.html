<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Critical background to prevent flash -->
        <style>
            * {
                font-family: "Nunito", sans-serif;
                font-optical-sizing: auto;
                font-style: normal;
            }

            html {
                background-color: %VITE_THEME_LIGHT%; /* stone-100 */
                color: %VITE_THEME_DARK%; /* text-stone-600 */
            }

            @media (prefers-color-scheme: dark) {
                html {
                    background-color: %VITE_THEME_DARK%; /* stone-900 */
                    color: %VITE_THEME_LIGHT%; /* stone-100 */
                }
            }
        </style>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <title>%VITE_APP_NAME% - Web app catalog</title>
        <meta name="description" content="The world's largest web app catalog!" />
        <!-- Google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap" media="none" onload="this.media = 'all';" />
        <noscript>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap" />
        </noscript>
        <!-- Icons -->
        <link rel="icon" href="/logo/korru-logo-192.png" />
        <link rel="mask-icon" href="/korru-logo-maskable-192.png" color="%VITE_THEME_DARK%">
        <link rel="apple-touch-icon" href="/logo/korru-logo-192.png" sizes="192x192" />
        <!-- Theme -->
        <meta name="theme-color" content="%VITE_THEME_LIGHT%" media="(prefers-color-scheme: light)" />
        <meta name="theme-color" content="%VITE_THEME_DARK%" media="(prefers-color-scheme: dark)" />
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script src="/src/index.tsx" type="module"></script>
    </body>
</html>
